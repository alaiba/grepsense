name: Release

# Tag a release (e.g. v0.1.0) to build + publish images to GHCR and the package
# to PyPI.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write   # for PyPI trusted publishing

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: grepsense          # the Python image (embedder + MCP server)
            context: .
          - image: grepsense-zoekt     # the patched Zoekt engine
            context: ./zoekt
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          # The grepsense image bundles torch + the model and is large; arm64 can
          # be added here (platforms: linux/amd64,linux/arm64) at the cost of build time.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  pypi:
    runs-on: ubuntu-latest
    # Requires a PyPI "trusted publisher" configured for this repo.
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
