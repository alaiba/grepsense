name: Release

# Tag a release (e.g. v0.1.0) to build + publish multi-arch images to GHCR.
# Each (image, arch) builds on a native runner and is pushed by digest; a merge
# job then assembles the tagged multi-arch manifest (amd64 + arm64).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: grepsense,       context: .,       platform: linux/amd64, arch: amd64, runner: ubuntu-latest }
          - { image: grepsense,       context: .,       platform: linux/arm64, arch: arm64, runner: ubuntu-24.04-arm }
          - { image: grepsense-zoekt, context: ./zoekt, platform: linux/amd64, arch: amd64, runner: ubuntu-latest }
          - { image: grepsense-zoekt, context: ./zoekt, platform: linux/arm64, arch: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.image }}-${{ matrix.arch }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*.txt
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [grepsense, grepsense-zoekt]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - name: Create + push multi-arch manifest
        run: |
          tags=$(jq -r '.tags[] | "-t " + .' <<< "$DOCKER_METADATA_OUTPUT_JSON" | tr '\n' ' ')
          digests=$(cat /tmp/digests/*.txt | sed "s|^|ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@|" | tr '\n' ' ')
          docker buildx imagetools create $tags $digests
      - run: docker buildx imagetools inspect "ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}"

# PyPI publishing is intentionally deferred until a PyPI trusted publisher is
# configured for this repo. Add a job using pypa/gh-action-pypi-publish then.
