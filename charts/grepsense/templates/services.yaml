apiVersion: v1
kind: Service
metadata:
  name: {{ include "grepsense.fullname" . }}-mcp
  labels:
    {{- include "grepsense.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - name: http
      port: {{ .Values.mcp.service.port }}
      targetPort: http
  selector:
    {{- include "grepsense.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grepsense.fullname" . }}-zoekt-web
  labels:
    {{- include "grepsense.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.zoektWeb.service.port }}
      targetPort: http
  selector:
    {{- include "grepsense.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: zoekt-web
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grepsense.fullname" . }}-chromadb
  labels:
    {{- include "grepsense.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.chromadb.service.port }}
      targetPort: http
  selector:
    {{- include "grepsense.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
